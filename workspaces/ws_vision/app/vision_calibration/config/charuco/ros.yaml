charuco_service_node:
  ros__parameters:
    charuco_parameters:
      squaresSidesSizeM: 0.03
      markersSidesSizeM: 0.0225
      numberOfBitsForMarkersSides: 4
      numberOfMarkers: 54
      numberOfSquaresInX: 12
      numberOfSquaresInY: 9
      dictionaryId: 5
      # squaresSidesSizeM: 0.025
      # markersSidesSizeM: 0.018
      # numberOfBitsForMarkersSides: 4
      # numberOfMarkers: 17
      # numberOfSquaresInX: 7
      # numberOfSquaresInY: 5
      # dictionaryId: 1
    function_parameters:
      use_median_blur: false
      median_blur_k_size: 6
      use_dynamic_range: true
      use_bilateral_filter: false
      bilateral_filter_pixel_neighborhood: 5
      bilateral_filter_sigma_color: 100.0
      bilateral_filter_sigma_space: 100.0
      bilateral_filter_border_type: 4
      use_clahe: true
      clahe_clip_limit: 1.0
      clahe_size_x: 2
      clahe_size_y: 2
      use_adaptive_threshold: false
      adaptive_threshold_max_value: 255.0
      adaptive_threshold_method: 1
      adaptive_threshold_type: 0
      adaptive_threshold_block_size: 65
      adaptive_threshold_constant_offset_from_mean: 0.0
    tf_parameters:
      use_static_tf_broadcaster: true
      tf_broadcaster_republish_rate: 10.0
      sensor_frame_override: "camera_right_color_optical_frame"
      charuco_tf_frame: charuco
    
    servers:
      detector:
        topic: /tags_detector/detect_charuco

    subscribers:
      enable_subscriber: true
      image_topic:
        topic: /camera_right/color/image_raw
        queue_size: 10
      camera_info:
        topic: /camera_right/color/camera_info
        queue_size: 10

    publishers:
      publish_charuco_pose: true
      image_results_publisher:
        topic: /tags_detector/charuco/image_result
        queue_size: 1
        latch: false
      charuco_pose_publisher:
        topic: /tags_detector/charuco/pose
        queue_size: 1
        latch: false
