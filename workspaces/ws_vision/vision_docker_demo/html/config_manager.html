<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程配置管理</title>
    <link rel="stylesheet" href="/static/common.css">
    <style>
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #f5f5f5;
            padding: 12px 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 20px;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            position: relative;
        }

        .tab:hover {
            color: #333;
            background: #f9f9f9;
        }

        .tab.active {
            color: #0e639c;
            border-bottom-color: #0e639c;
            background: white;
        }

        .tab-content {
            flex: 1;
            display: none;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .tab-content iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🔧 远程配置管理</h1>
    </div>

    <div class="main-container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('config')" id="tab-config">
                📁 配置管理
            </button>
            <button class="tab" onclick="switchTab('remote')" id="tab-remote">
                🚀 远程启动
            </button>
        </div>

        <div class="tab-content active" id="content-config">
            <iframe src="/remote-config" title="配置管理"></iframe>
        </div>

        <div class="tab-content" id="content-remote">
            <iframe src="/remote-start" title="远程启动"></iframe>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // 隐藏所有tab内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 移除所有tab的active状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // 显示选中的tab内容
            const content = document.getElementById(`content-${tabName}`);
            if (content) {
                content.classList.add('active');
            }

            // 激活选中的tab按钮
            const tab = document.getElementById(`tab-${tabName}`);
            if (tab) {
                tab.classList.add('active');
            }
        }

        // 页面加载时默认显示配置管理tab
        window.addEventListener('DOMContentLoaded', () => {
            switchTab('config');
        });
    </script>
</body>

</html>
