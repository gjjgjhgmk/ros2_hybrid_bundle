  no_obstacle_line:
    nominal:
      type: line
      start: [0.1, 0.5]
      goal: [0.9, 0.5]
      num_points: 150
    obstacles: []
    safety_margin: 0.005
    fmp:
      enabled: true
      smoothing: true

  obstacle_middle:
    nominal:
      type: line
      start: [0.1, 0.5]
      goal: [0.9, 0.5]
      num_points: 150
